<style>
    .modP-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
    .modP-inst { font-size: 2.2rem; font-weight: 800; color: #4a4a4a; margin-bottom: 15px; text-align: center; }
    .modP-sub { font-size: 1.5rem; font-weight: 800; color: #ff6b6b; margin-bottom: 30px; text-align: center; }
    
    .modP-stage { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; min-height: 120px; align-items: center; }
    .modP-apple {
        width: 90px; height: 90px; cursor: pointer; transition: transform 0.2s;
        filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.2));
    }
    .modP-apple:active { transform: scale(0.9); }
    .modP-apple.eaten { animation: modP-chomp 0.6s forwards; pointer-events: none; }
    
    .modP-panda-eat { font-size: 4rem; display: none; animation: modP-munch 0.5s; }
    
    .modP-choices { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .modP-choices.show { opacity: 1; pointer-events: auto; }
    
    .modP-btn {
        width: 80px; height: 80px; border-radius: 50%; background: white; border: none;
        font-size: 2.5rem; font-weight: 800; color: #4a4a4a; box-shadow: 0 6px 0 #d1d1d1;
        cursor: pointer; transition: transform 0.1s;
    }
    .modP-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d1d1d1; }
    .modP-btn.correct { background: #4ecdc4; color: white; box-shadow: 0 6px 0 #3ba89f; }
    .modP-btn.wrong { background: #ff6b6b; color: white; box-shadow: 0 6px 0 #d9534f; animation: modP-shake 0.5s; }

    @keyframes modP-chomp { 
        0% { transform: scale(1) rotate(0); opacity: 1; } 
        50% { transform: scale(1.3) rotate(20deg); opacity: 0.6; } 
        100% { transform: scale(0) rotate(45deg); opacity: 0; } 
    }
    @keyframes modP-munch { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    @keyframes modP-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>

<div class="game-content">
    <div class="modP-wrap">
        <div class="modP-inst" id="modP-inst">Take away!</div>
        <div class="modP-sub" id="modP-sub"></div>
        <div class="modP-stage" id="modP-stage"></div>
        <div class="modP-choices" id="modP-choices"></div>
    </div>
</div>

<script>
    let modP_startCount, modP_takeAway, modP_answer, modP_eatenCount;

    const modP_text = {
        en: { inst: "Tap to eat!", sub: "How many are left?", correct: "Yes!", wrong: "Try again!" },
        zh: { inst: "点击吃掉！", sub: "还剩几个？", correct: "答对了！", wrong: "再试一次！" }
    };

    function initCurrentModule() { modP_generateRound(); }
    function destroyCurrentModule() { window.speechSynthesis.cancel(); }

    function modP_generateRound() {
        modP_startCount = Math.floor(Math.random() * 3) + 3; // 3 to 5
        modP_takeAway = Math.floor(Math.random() * (modP_startCount - 1)) + 1; // 1 to (start-1)
        modP_answer = modP_startCount - modP_takeAway;
        modP_eatenCount = 0;

        const lang = window.appState.currentLang;
        document.getElementById('modP-inst').innerText = modP_text[lang].inst;
        
        const code = lang === 'en' ? 'en-US' : 'zh-CN';
        const takeText = lang === 'en' ? `Eat ${modP_takeAway} apple${modP_takeAway > 1 ? 's' : ''}!` : `吃掉 ${modP_takeAway} 个苹果！`;
        document.getElementById('modP-sub').innerText = takeText;
        speak(takeText, code);

        // Build apples
        const stage = document.getElementById('modP-stage');
        stage.innerHTML = '';
        for(let i=0; i<modP_startCount; i++) {
            const img = document.createElement('img');
            img.src = 'apple.png';
            img.className = 'modP-apple';
            img.onclick = () => modP_eatApple(img);
            stage.appendChild(img);
        }

        // Hide choices until done eating
        const choices = document.getElementById('modP-choices');
        choices.classList.remove('show');
        choices.innerHTML = '';
    }

    function modP_eatApple(el) {
        if(el.classList.contains('eaten')) return;
        el.classList.add('eaten');
        modP_eatenCount++;

        if(modP_eatenCount === modP_takeAway) {
            // Show choices
            setTimeout(modP_showChoices, 700);
        } else if(modP_eatenCount > modP_takeAway) {
            // Ate too many - reset
            const lang = window.appState.currentLang;
            const code = lang === 'en' ? 'en-US' : 'zh-CN';
            speak(modP_text[lang].wrong, code);
            setTimeout(modP_generateRound, 1000);
        }
    }

    function modP_showChoices() {
        const lang = window.appState.currentLang;
        document.getElementById('modP-inst').innerText = modP_text[lang].sub;

        const choices = document.getElementById('modP-choices');
        choices.innerHTML = '';

        // Generate 3 options
        let options = new Set([modP_answer]);
        while(options.size < 3) {
            let r = Math.floor(Math.random() * 5);
            if(r !== modP_answer) options.add(r);
        }
        let arr = Array.from(options).sort(() => Math.random() - 0.5);

        arr.forEach(num => {
            const btn = document.createElement('button');
            btn.className = 'modP-btn';
            btn.innerText = num;
            btn.onclick = () => modP_checkAnswer(num, btn);
            choices.appendChild(btn);
        });

        choices.classList.add('show');
    }

    function modP_checkAnswer(num, btn) {
        const lang = window.appState.currentLang;
        const code = lang === 'en' ? 'en-US' : 'zh-CN';

        if(num === modP_answer) {
            btn.classList.add('correct');
            speak(modP_text[lang].correct, code);
            setTimeout(modP_generateRound, 1500);
        } else {
            btn.classList.add('wrong');
            speak(modP_text[lang].wrong, code);
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }
</script>
