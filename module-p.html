<style>
    .modP-stage { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
    .modP-item { width: 70px; height: 70px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.15)); }
    .modP-item:active { transform: scale(0.9); }
    .modP-item.eaten { animation: modP-chomp 0.6s forwards; pointer-events: none; }
    .modP-choices { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .modP-choices.show { opacity: 1; pointer-events: auto; }
    .modP-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: none; font-size: 2rem; font-weight: 800; color: #4a4a4a; box-shadow: 0 6px 0 #d1d1d1; cursor: pointer; }
    .modP-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d1d1d1; }
    .modP-btn.correct { background: #4ecdc4; color: white; box-shadow: 0 6px 0 #3ba89f; }
    .modP-btn.wrong { background: #ff6b6b; color: white; box-shadow: 0 6px 0 #d9534f; animation: modP-shake 0.5s; }
    @keyframes modP-chomp { 0% { transform: scale(1) rotate(0); opacity: 1; } 100% { transform: scale(0) rotate(45deg); opacity: 0; } }
    @keyframes modP-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>
<div class="module-content"><div class="modP-stage" id="modP-stage"></div><div class="modP-choices" id="modP-choices"></div></div>
<script>
    let modP_start, modP_take, modP_answer, modP_eaten;
    function initModule() {
        modP_start = Math.floor(Math.random() * 3) + 3; modP_take = Math.floor(Math.random() * (modP_start - 1)) + 1; modP_answer = modP_start - modP_take; modP_eaten = 0;
        window.setInstruction(`Tap to eat ${modP_take}!`, `点击吃掉 ${modP_take} 个！`);
        const stage = document.getElementById('modP-stage'); stage.innerHTML = '';
        for(let i=0; i<modP_start; i++) { const img = document.createElement('img'); img.src = 'apple.png'; img.className = 'modP-item'; img.onclick = () => modP_eat(img); stage.appendChild(img); }
        document.getElementById('modP-choices').classList.remove('show');
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modP_eat(el) {
        if(el.classList.contains('eaten')) return; el.classList.add('eaten'); modP_eaten++;
        if(modP_eaten === modP_take) setTimeout(modP_showChoices, 700);
        else if(modP_eaten > modP_take) { window.speak("Too many!", "吃太多了！", getLangCode()); setTimeout(initModule, 1000); }
    }
    function modP_showChoices() {
        window.setInstruction("How many are left?", "还剩几个？");
        const choices = document.getElementById('modP-choices'); choices.innerHTML = '';
        let options = new Set([modP_answer]); while(options.size < 3) { let r = Math.floor(Math.random() * 5); if(r !== modP_answer) options.add(r); }
        Array.from(options).sort(() => Math.random() - 0.5).forEach(num => { const btn = document.createElement('button'); btn.className = 'modP-btn'; btn.innerText = num; btn.onclick = () => modP_check(num, btn); choices.appendChild(btn); });
        choices.classList.add('show');
    }
    function modP_check(num, btn) {
        if(num === modP_answer) { btn.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { btn.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => btn.classList.remove('wrong'), 500); }
    }
</script>
