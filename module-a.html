<style>
    .modA-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 350px; }
    .modA-item { width: 80px; height: 80px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15)); }
    .modA-item:active { transform: scale(0.9); }
    .modA-item.tapped { animation: modA-pop 0.5s forwards; }
    @keyframes modA-pop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
</style>
<div class="module-content"><div class="modA-grid" id="modA-grid"></div></div>
<script>
    let modA_count = 0, modA_target = 0;
    const modA_imgs = ['apple.png', 'star.png', 'butterfly.png'];
    function initModule() {
        modA_count = 0; modA_target = Math.floor(Math.random() * 3) + 1;
        const imgSrc = modA_imgs[Math.floor(Math.random() * modA_imgs.length)];
        window.setInstruction(`Tap ${modA_target}!`, `点击 ${modA_target} 个！`);
        const grid = document.getElementById('modA-grid'); grid.innerHTML = '';
        for(let i=0; i<5; i++) { 
            const img = document.createElement('img'); img.src = imgSrc; img.className = 'modA-item'; 
            img.onclick = () => modA_tap(img); grid.appendChild(img); 
        }
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modA_tap(el) {
        if (el.classList.contains('tapped')) return; el.classList.add('tapped'); modA_count++;
        const numsEn = ["", "One", "Two", "Three"], numsZh = ["", "一", "二", "三"];
        window.speak(window.appState.currentLang === 'en' ? numsEn[modA_count] : numsZh[modA_count], getLangCode());
        if (modA_count === modA_target) setTimeout(() => window.showCelebration("Great Job!", "太棒了！", "Next", "下一题", initModule), 600);
        else if (modA_count > modA_target) setTimeout(() => { window.speak("Too many!", "太多了！", getLangCode()); setTimeout(initModule, 1500); }, 400);
    }
</script>
