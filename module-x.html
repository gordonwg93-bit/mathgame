<style>
    .modX-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 350px; }
    .modX-item { width: 50px; height: 50px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.15)); }
    .modX-item:active { transform: scale(0.9); }
    .modX-item.tapped { animation: modX-pop 0.5s forwards; }
    @keyframes modX-pop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
</style>
<div class="module-content"><div class="modX-grid" id="modX-grid"></div></div>
<script>
    let modX_count = 0, modX_target = 0;
    const modX_imgs = ['apple.png', 'star.png', 'heart.png', 'balloon.png'];
    function initModule() {
        modX_count = 0; modX_target = Math.floor(Math.random() * 20) + 1;
        const imgSrc = modX_imgs[Math.floor(Math.random() * modX_imgs.length)];
        window.setInstruction(`Tap ${modX_target}!`, `点击 ${modX_target} 个！`);
        const grid = document.getElementById('modX-grid'); grid.innerHTML = '';
        for(let i=0; i<25; i++) { const img = document.createElement('img'); img.src = imgSrc; img.className = 'modX-item'; img.onclick = () => modX_tap(img); grid.appendChild(img); }
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modX_tap(el) {
        if (el.classList.contains('tapped')) return; el.classList.add('tapped'); modX_count++;
        window.speak(modX_count.toString(), getLangCode());
        if (modX_count === modX_target) setTimeout(() => window.showCelebration("Great Job!", "太棒了！", "Next", "下一题", initModule), 600);
        else if (modX_count > modX_target) setTimeout(() => { window.speak("Too many!", "太多了！", getLangCode()); setTimeout(initModule, 1500); }, 400);
    }
</script>
