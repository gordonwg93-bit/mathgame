<style>
    .modE-box { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center; }
    .modE-items { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .modE-item { width: 40px; height: 40px; filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.15)); }
    .modE-text { font-size: 2.5rem; font-weight: 800; color: #4a4a4a; }
    .modE-choices { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    .modE-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: none; font-size: 2rem; font-weight: 800; color: #4a4a4a; box-shadow: 0 6px 0 #d1d1d1; cursor: pointer; }
    .modE-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d1d1d1; }
    .modE-btn.correct { background: #4ecdc4; color: white; box-shadow: 0 6px 0 #3ba89f; }
    .modE-btn.wrong { background: #ff6b6b; color: white; box-shadow: 0 6px 0 #d9534f; animation: modE-shake 0.5s; }
    @keyframes modE-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>
<div class="module-content">
    <div class="modE-box">
        <div class="modE-items" id="modE-items"></div>
        <div class="modE-text" id="modE-text"></div>
    </div>
    <div class="modE-choices" id="modE-choices"></div>
</div>
<script>
    let modE_num = 0, modE_isMore = true;
    const modE_imgs = ['apple.png', 'heart.png', 'car.png'];
    function initModule() {
        modE_num = Math.floor(Math.random() * 9) + 1; // 1 to 9
        modE_isMore = Math.random() > 0.5;
        const imgSrc = modE_imgs[Math.floor(Math.random() * modE_imgs.length)];
        const correct = modE_isMore ? modE_num + 1 : modE_num - 1;
        
        const enText = modE_isMore ? `What is one more than ${modE_num}?` : `What is one less than ${modE_num}?`;
        const zhText = modE_isMore ? `${modE_num} 多 1 是几？` : `${modE_num} 少 1 是几？`;
        window.setInstruction(enText, zhText);

        const itemsDiv = document.getElementById('modE-items'); itemsDiv.innerHTML = '';
        for(let i=0; i<modE_num; i++) { const img = document.createElement('img'); img.src = imgSrc; img.className = 'modE-item'; itemsDiv.appendChild(img); }
        document.getElementById('modE-text').innerText = modE_num;

        const choicesDiv = document.getElementById('modE-choices'); choicesDiv.innerHTML = '';
        let options = new Set([correct]);
        while(options.size < 3) { let r = Math.floor(Math.random() * 10) + 1; if(r !== correct && r >= 0) options.add(r); }
        Array.from(options).sort(() => Math.random() - 0.5).forEach(num => {
            const btn = document.createElement('button'); btn.className = 'modE-btn'; btn.innerText = num;
            btn.onclick = () => modE_check(num, btn, correct);
            choicesDiv.appendChild(btn);
        });
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modE_check(num, btn, correct) {
        if(num === correct) { btn.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { btn.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => btn.classList.remove('wrong'), 500); }
    }
</script>
