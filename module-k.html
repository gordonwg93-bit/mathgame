<style>
    .modK-stage { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .modK-group { display: flex; gap: 8px; padding: 15px; background: rgba(255,255,255,0.6); border-radius: 20px; }
    .modK-item { width: 50px; height: 50px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.15)); }
    .modK-symbol { font-size: 2.5rem; font-weight: 800; color: #ff6b6b; }
    .modK-choices { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .modK-btn { width: 80px; height: 80px; border-radius: 50%; background: white; border: none; font-size: 2.5rem; font-weight: 800; color: #4a4a4a; box-shadow: 0 6px 0 #d1d1d1; cursor: pointer; }
    .modK-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d1d1d1; }
    .modK-btn.correct { background: #4ecdc4; color: white; box-shadow: 0 6px 0 #3ba89f; }
    .modK-btn.wrong { background: #ff6b6b; color: white; box-shadow: 0 6px 0 #d9534f; animation: modK-shake 0.5s; }
    @keyframes modK-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>
<div class="module-content"><div class="modK-stage" id="modK-stage"></div><div class="modK-choices" id="modK-choices"></div></div>
<script>
    let modK_a, modK_b, modK_target;
    const modK_imgs = ['apple.png', 'star.png', 'cookie.png'];
    function initModule() {
        modK_a = Math.floor(Math.random() * 3) + 1; modK_b = Math.floor(Math.random() * (5 - modK_a)) + 1; modK_target = modK_a + modK_b;
        const imgSrc = modK_imgs[Math.floor(Math.random() * modK_imgs.length)];
        const enStory = `Bao has ${modK_a}. He gets ${modK_b} more. How many in total?`;
        const zhStory = `宝有 ${modK_a} 个。又得到 ${modK_b} 个。一共几个？`;
        window.setInstruction(enStory, zhStory);
        const stage = document.getElementById('modK-stage'); stage.innerHTML = '';
        const groupA = document.createElement('div'); groupA.className = 'modK-group'; 
        for(let i=0; i<modK_a; i++) { const img = document.createElement('img'); img.src = imgSrc; img.className = 'modK-item'; groupA.appendChild(img); } stage.appendChild(groupA);
        const plus = document.createElement('div'); plus.className = 'modK-symbol'; plus.innerText = '+'; stage.appendChild(plus);
        const groupB = document.createElement('div'); groupB.className = 'modK-group'; 
        for(let i=0; i<modK_b; i++) { const img = document.createElement('img'); img.src = imgSrc; img.className = 'modK-item'; groupB.appendChild(img); } stage.appendChild(groupB);
        const choicesDiv = document.getElementById('modK-choices'); choicesDiv.innerHTML = '';
        let options = new Set([modK_target]);
        while(options.size < 3) options.add(Math.floor(Math.random() * 5) + 1);
        Array.from(options).sort(() => Math.random() - 0.5).forEach(num => {
            const btn = document.createElement('button'); btn.className = 'modK-btn'; btn.innerText = num;
            btn.onclick = () => modK_check(num, btn); choicesDiv.appendChild(btn);
        });
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modK_check(num, btn) {
        if(num === modK_target) { btn.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { btn.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => btn.classList.remove('wrong'), 500); }
    }
</script>
