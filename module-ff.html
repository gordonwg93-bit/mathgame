<style>
    .modFF-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 300px; height: 300px; margin-bottom: 40px; background: white; padding: 15px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .modFF-cell { border-radius: 15px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; }
    .modFF-cell.center { background: #e0f7fa; }
    .modFF-item { width: 70px; height: 70px; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.15)); }
    .modFF-choices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 350px; }
    .modFF-btn { padding: 15px 5px; border-radius: 15px; background: white; border: none; font-size: 1rem; font-weight: 800; color: #4a4a4a; box-shadow: 0 4px 0 #d1d1d1; cursor: pointer; }
    .modFF-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d1d1d1; }
    .modFF-btn.correct { background: #4ecdc4; color: white; }
    .modFF-btn.wrong { background: #ff6b6b; color: white; animation: modFF-shake 0.5s; }
    @keyframes modFF-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
</style>
<div class="module-content"><div class="modFF-grid" id="modFF-grid"></div><div class="modFF-choices" id="modFF-choices"></div></div>
<script>
    const modFF_pos = [{ id: 0, en: 'Top Left', zh: '左上' }, { id: 1, en: 'Top', zh: '上' }, { id: 2, en: 'Top Right', zh: '右上' }, { id: 3, en: 'Left', zh: '左' }, { id: 5, en: 'Right', zh: '右' }, { id: 6, en: 'Bottom Left', zh: '左下' }, { id: 7, en: 'Bottom', zh: '下' }, { id: 8, en: 'Bottom Right', zh: '右下' }];
    let modFF_target = 0;
    function initModule() {
        document.querySelectorAll('.modFF-item').forEach(b => b.remove());
        modFF_target = modFF_pos[Math.floor(Math.random() * modFF_pos.length)].id;
        const grid = document.getElementById('modFF-grid'); grid.innerHTML = '';
        for(let i=0; i<9; i++) {
            const cell = document.createElement('div'); cell.className = 'modFF-cell'; if(i === 4) cell.classList.add('center');
            if(i === modFF_target) { const img = document.createElement('img'); img.src = 'apple.png'; img.className = 'modFF-item'; cell.appendChild(img); }
            grid.appendChild(cell);
        }
        window.setInstruction("Where is the apple?", "苹果在哪里？");
        const choicesDiv = document.getElementById('modFF-choices'); choicesDiv.innerHTML = '';
        const options = [...modFF_pos].sort(() => Math.random() - 0.5).slice(0, 6);
        options.forEach(pos => { const btn = document.createElement('button'); btn.className = 'modFF-btn'; btn.innerText = window.appState.currentLang === 'en' ? pos.en : pos.zh; btn.onclick = () => modFF_check(pos.id, btn); choicesDiv.appendChild(btn); });
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modFF_check(posId, btn) {
        if(posId === modFF_target) { btn.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { btn.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => btn.classList.remove('wrong'), 500); }
    }
</script>
