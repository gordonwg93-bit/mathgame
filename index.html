<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bao's Math">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Bao's Bilingual Math</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap');
        body { margin: 0; padding: 0; font-family: 'Nunito', sans-serif; background: linear-gradient(to bottom right, #e0f7fa, #fce4ec); height: 100vh; width: 100vw; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* --- TOP BAR --- */
        .top-bar { position: absolute; top: 40px; width: 90%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .lang-toggle { background: white; border: none; padding: 12px 24px; border-radius: 50px; font-size: 1.2rem; font-weight: 800; color: #ff6b6b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .lang-toggle:active { transform: scale(0.95); }
        .mascot-img { width: 80px; height: auto; animation: bounce 2s infinite; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15)); }

        /* --- MAP SCREEN --- */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        .screen.active { display: flex; }
        
        .map-title { font-size: 2.5rem; font-weight: 800; color: #4a4a4a; margin-bottom: 40px; text-shadow: 2px 2px 0px rgba(255,255,255,0.8); }
        
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 30px; width: 90%; max-width: 800px; }
        
        .module-card {
            background: white; border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .module-card:active { transform: scale(0.95); }
        .module-card.locked { background: #e0e0e0; opacity: 0.6; cursor: not-allowed; }
        .module-icon { font-size: 4rem; }
        .module-title { font-size: 1.2rem; font-weight: 800; color: #4a4a4a; }

        /* --- GAME SCREEN --- */
        #game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom right, #e0f7fa, #fce4ec); z-index: 50; }
        
        .back-btn {
            position: absolute; top: 40px; left: 20px; background: white; border: none; width: 50px; height: 50px;
            border-radius: 50%; font-size: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; z-index: 101;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn:active { transform: scale(0.9); }

        #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <!-- TOP BAR (Always visible) -->
    <div class="top-bar">
        <img src="panda.png" class="mascot-img" alt="Mascot">
        <button class="lang-toggle" onclick="toggleLanguage()">中文 / EN</button>
    </div>

    <!-- SCREEN 1: THE MAP -->
    <div id="map-screen" class="screen active">
        <div class="map-title" id="map-title">Choose a Game!</div>
        <div class="module-grid" id="module-grid">
            <!-- Modules will be injected here by JS -->
        </div>
    </div>

    <!-- SCREEN 2: THE GAME -->
    <div id="game-screen" class="screen">
        <button class="back-btn" onclick="backToMap()">🏠</button>
        <div id="game-container">
            <!-- Dynamic modules load here -->
        </div>
    </div>

    <script>
        // ==========================================
        // 🧠 THE GLOBAL BRAIN & MASTER REGISTRY
        // ==========================================
        window.appState = { currentLang: 'en' };

        // ADD NEW MODULES HERE! (No file limit!)
        const MODULE_REGISTRY = [
            { id: 'module-a', file: 'module-a.html', icon: '🍎', titleEn: 'Apple Orchard', titleZh: '苹果园', unlocked: true },
            { id: 'module-h', file: 'module-h.html', icon: '🧺', titleEn: 'Picnic River', titleZh: '野餐河', unlocked: false }, // Coming soon!
            { id: 'module-hh', file: 'module-hh.html', icon: '🏰', titleEn: 'Shape Castle', titleZh: '形状城堡', unlocked: false } // Coming soon!
        ];

        // ==========================================
        // 🗣️ BILINGUAL ENGINE
        // ==========================================
        const uiText = {
            en: { mapTitle: "Choose a Game!", back: "Home" },
            zh: { mapTitle: "选择游戏！", back: "回家" }
        };

        function speak(text, langCode) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = langCode; u.rate = 0.9; u.pitch = 1.2;
                window.speechSynthesis.speak(u);
            }
        }

        function toggleLanguage() {
            window.appState.currentLang = window.appState.currentLang === 'en' ? 'zh' : 'en';
            updateMapUI();
            const langCode = window.appState.currentLang === 'en' ? 'en-US' : 'zh-CN';
            speak(uiText[window.appState.currentLang].mapTitle, langCode);
        }

        function updateMapUI() {
            const lang = window.appState.currentLang;
            document.getElementById('map-title').innerText = uiText[lang].mapTitle;
            
            const grid = document.getElementById('module-grid');
            grid.innerHTML = ''; // Clear old cards

            MODULE_REGISTRY.forEach(mod => {
                const card = document.createElement('div');
                card.className = `module-card ${mod.unlocked ? '' : 'locked'}`;
                card.innerHTML = `
                    <div class="module-icon">${mod.icon}</div>
                    <div class="module-title">${lang === 'en' ? mod.titleEn : mod.titleZh}</div>
                `;
                if (mod.unlocked) {
                    card.onclick = () => loadModule(mod.file);
                }
                grid.appendChild(card);
            });
        }

        // ==========================================
        // 🪡 THE DYNAMIC STITCHER (Module Loader)
        // ==========================================
        async function loadModule(file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error('Module not found');
                const htmlText = await response.text();

                // Create a temporary container to parse the HTML
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlText;

                // 1. Inject Styles
                tempDiv.querySelectorAll('style').forEach(style => {
                    style.setAttribute('data-dynamic-module', 'true');
                    document.head.appendChild(style);
                });

                // 2. Inject Game HTML
                const gameContent = tempDiv.querySelector('.game-content');
                const container = document.getElementById('game-container');
                container.innerHTML = '';
                container.appendChild(gameContent);

                // 3. Inject and Execute Scripts
                tempDiv.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.setAttribute('data-dynamic-module', 'true');
                    newScript.innerHTML = oldScript.innerHTML;
                    document.body.appendChild(newScript);
                });

                // 4. Initialize the game
                if (typeof window.initCurrentModule === 'function') {
                    window.initCurrentModule();
                }

                // Switch screens
                document.getElementById('map-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');

            } catch (error) {
                console.error("Failed to load module:", error);
                alert("Oops! Game file missing.");
            }
        }

        function backToMap() {
            // 1. Let the game clean up its own timers/intervals
            if (typeof window.destroyCurrentModule === 'function') {
                window.destroyCurrentModule();
            }
            
            // 2. Clear the screen
            document.getElementById('game-container').innerHTML = '';
            
            // 3. Remove injected CSS and JS to prevent memory leaks
            document.querySelectorAll('[data-dynamic-module]').forEach(el => el.remove());

            // 4. Switch screens
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('map-screen').classList.add('active');
        }

        // --- INIT ---
        window.onload = () => {
            updateMapUI();
            setTimeout(() => speak(uiText[window.appState.currentLang].mapTitle, 'en-US'), 500);
        };
    </script>
</body>
</html>
