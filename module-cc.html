<style>
    .modCC-pond { display: flex; gap: 15px; margin-bottom: 40px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .modCC-pad { width: 100px; height: 100px; cursor: pointer; transition: transform 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
    .modCC-pad img { width: 100%; height: 100%; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.15)); }
    .modCC-pad:active { transform: scale(0.9); }
    .modCC-num { position: absolute; top: -20px; font-size: 2rem; font-weight: 800; color: #ff6b6b; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
    .modCC-pad.jumped .modCC-num { opacity: 1; transform: translateY(0); }
    .modCC-frog { width: 70px; height: 70px; position: absolute; top: -30px; left: 15px; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.2)); z-index: 10; pointer-events: none; transition: all 0.3s; }
    .modCC-frog.jump-anim { animation: modCC-leap 0.4s; }
    @keyframes modCC-leap { 0% { transform: translateY(0) scale(1); } 50% { transform: translateY(-40px) scale(1.1); } 100% { transform: translateY(0) scale(1); } }
</style>

<div class="module-content">
    <div class="modCC-pond" id="modCC-pond"></div>
</div>

<script>
    let modCC_step = 0;
    const modCC_max = 5;

    function initModule() {
        modCC_step = 0;
        window.setInstruction("Count by 2s! Tap the lily pads.", "两个两个数！点击荷叶。");
        const pond = document.getElementById('modCC-pond');
        pond.innerHTML = '';

        const startPad = document.createElement('div'); startPad.className = 'modCC-pad'; startPad.style.visibility = 'hidden'; pond.appendChild(startPad);
        const frog = document.createElement('img'); frog.src = 'frog.png'; frog.className = 'modCC-frog'; frog.id = 'modCC-frog'; startPad.appendChild(frog);

        for(let i=1; i<=modCC_max; i++) {
            const pad = document.createElement('div'); pad.className = 'modCC-pad'; pad.id = `modCC-pad-${i}`;
            pad.innerHTML = `<img src="lilypad.png"><div class="modCC-num">${i * 2}</div>`;
            pad.onclick = () => modCC_jump(i, pad);
            pond.appendChild(pad);
        }
    }

    function destroyModule() { window.speechSynthesis.cancel(); }

    function modCC_jump(step, padEl) {
        if(step !== modCC_step + 1) return;
        modCC_step = step;
        const frog = document.getElementById('modCC-frog');
        padEl.appendChild(frog);
        frog.classList.add('jump-anim');
        setTimeout(() => frog.classList.remove('jump-anim'), 400);
        padEl.classList.add('jumped');

        const num = step * 2;
        const numsEn = { 2: 'Two', 4: 'Four', 6: 'Six', 8: 'Eight', 10: 'Ten' };
        const numsZh = { 2: '二', 4: '四', 6: '六', 8: '八', 10: '十' };
        window.speak(window.appState.currentLang === 'en' ? numsEn[num] : numsZh[num], getLangCode());

        if(step === modCC_max) {
            setTimeout(() => {
                window.showCelebration("Great jumping!", "跳得太棒了！", "Play Again!", "再玩一次！", initModule);
            }, 800);
        }
    }
</script>
