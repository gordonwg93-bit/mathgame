<style>
    .modD-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 400px; }
    .modD-item { width: 55px; height: 55px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.15)); }
    .modD-item:active { transform: scale(0.9); }
    .modD-item.tapped { animation: modD-pop 0.5s forwards; }
    @keyframes modD-pop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
</style>
<div class="module-content"><div class="modD-grid" id="modD-grid"></div></div>
<script>
    let modD_count = 0, modD_target = 0;
    const modD_imgs = ['star.png', 'butterfly.png', 'fish.png', 'cookie.png'];
    function initModule() {
        modD_count = 0; modD_target = Math.floor(Math.random() * 10) + 1;
        const imgSrc = modD_imgs[Math.floor(Math.random() * modD_imgs.length)];
        window.setInstruction(`Tap ${modD_target}!`, `点击 ${modD_target} 个！`);
        const grid = document.getElementById('modD-grid'); grid.innerHTML = '';
        for(let i=0; i<15; i++) { 
            const img = document.createElement('img'); img.src = imgSrc; img.className = 'modD-item'; 
            img.onclick = () => modD_tap(img); grid.appendChild(img); 
        }
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modD_tap(el) {
        if (el.classList.contains('tapped')) return; el.classList.add('tapped'); modD_count++;
        const numsEn = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten"];
        const numsZh = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
        window.speak(window.appState.currentLang === 'en' ? numsEn[modD_count] : numsZh[modD_count], getLangCode());
        if (modD_count === modD_target) setTimeout(() => window.showCelebration("Great Job!", "太棒了！", "Next", "下一题", initModule), 600);
        else if (modD_count > modD_target) setTimeout(() => { window.speak("Too many!", "太多了！", getLangCode()); setTimeout(initModule, 1500); }, 400);
    }
</script>
