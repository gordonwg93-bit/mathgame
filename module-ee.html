<style>
    .modEE-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
    .modEE-inst { font-size: 2.2rem; font-weight: 800; color: #4a4a4a; margin-bottom: 40px; text-align: center; }
    
    .modEE-pattern { display: flex; gap: 20px; margin-bottom: 50px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .modEE-item { width: 90px; height: 90px; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15)); }
    .modEE-qmark { font-size: 4rem; font-weight: 800; color: #ff6b6b; width: 90px; text-align: center; }

    .modEE-choices { display: flex; gap: 30px; }
    .modEE-choice { width: 100px; height: 100px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15)); background: white; padding: 10px; border-radius: 20px; }
    .modEE-choice:active { transform: scale(0.9); }
    .modEE-choice.correct { background: #4ecdc4; animation: modEE-pop 0.5s; }
    .modEE-choice.wrong { background: #ff6b6b; animation: modEE-shake 0.5s; }

    @keyframes modEE-pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes modEE-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>

<div class="game-content">
    <div class="modEE-wrap">
        <div class="modEE-inst" id="modEE-inst">What comes next?</div>
        <div class="modEE-pattern" id="modEE-pattern"></div>
        <div class="modEE-choices" id="modEE-choices"></div>
    </div>
</div>

<script>
    const modEE_items = [
        { name: 'apple', img: 'apple.png' },
        { name: 'banana', img: 'banana.png' },
        { name: 'grape', img: 'grape.png' }
    ];
    let modEE_target;

    const modEE_text = {
        en: { inst: "What comes next?", correct: "Yes!", wrong: "Try again!" },
        zh: { inst: "下一个是什么？", correct: "答对了！", wrong: "再试一次！" }
    };

    function initCurrentModule() { modEE_generateRound(); }
    function destroyCurrentModule() { window.speechSynthesis.cancel(); }

    function modEE_generateRound() {
        // Pick 2 items for an AB pattern
        const shuffled = [...modEE_items].sort(() => Math.random() - 0.5);
        const itemA = shuffled[0];
        const itemB = shuffled[1];
        modEE_target = itemB; // Pattern will be A, B, A, B, ? -> Target is B

        const lang = window.appState.currentLang;
        document.getElementById('modEE-inst').innerText = modEE_text[lang].inst;

        // Build pattern: A, B, A, B, ?
        const patternDiv = document.getElementById('modEE-pattern');
        patternDiv.innerHTML = '';
        [itemA, itemB, itemA, itemB].forEach(item => {
            const img = document.createElement('img');
            img.src = item.img;
            img.className = 'modEE-item';
            patternDiv.appendChild(img);
        });
        const qmark = document.createElement('div');
        qmark.className = 'modEE-qmark';
        qmark.innerText = '?';
        patternDiv.appendChild(qmark);

        // Build choices (Target + 1 distractor)
        const choicesDiv = document.getElementById('modEE-choices');
        choicesDiv.innerHTML = '';
        const distractor = shuffled[2] || shuffled[0]; // Fallback if only 2 items
        const options = [modEE_target, distractor].sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const img = document.createElement('img');
            img.src = opt.img;
            img.className = 'modEE-choice';
            img.onclick = () => modEE_checkAnswer(opt, img);
            choicesDiv.appendChild(img);
        });
    }

    function modEE_checkAnswer(item, imgEl) {
        const lang = window.appState.currentLang;
        const code = lang === 'en' ? 'en-US' : 'zh-CN';

        if(item.name === modEE_target.name) {
            imgEl.classList.add('correct');
            speak(modEE_text[lang].correct, code);
            setTimeout(modEE_generateRound, 1200);
        } else {
            imgEl.classList.add('wrong');
            speak(modEE_text[lang].wrong, code);
            setTimeout(() => imgEl.classList.remove('wrong'), 500);
        }
    }
</script>
