<style>
    .modEE-pattern { display: flex; gap: 15px; margin-bottom: 40px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .modEE-item { width: 70px; height: 70px; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.15)); }
    .modEE-qmark { font-size: 3rem; font-weight: 800; color: #ff6b6b; width: 70px; text-align: center; }
    .modEE-choices { display: flex; gap: 20px; }
    .modEE-choice { width: 80px; height: 80px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.15)); background: white; padding: 10px; border-radius: 20px; }
    .modEE-choice:active { transform: scale(0.9); }
    .modEE-choice.correct { background: #4ecdc4; animation: modEE-pop 0.5s; }
    .modEE-choice.wrong { background: #ff6b6b; animation: modEE-shake 0.5s; }
    @keyframes modEE-pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes modEE-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>
<div class="module-content"><div class="modEE-pattern" id="modEE-pattern"></div><div class="modEE-choices" id="modEE-choices"></div></div>
<script>
    const modEE_items = [{ name: 'apple', img: 'apple.png' }, { name: 'star', img: 'star.png' }, { name: 'heart', img: 'heart.png' }];
    let modEE_target;
    function initModule() {
        window.setInstruction("What comes next?", "下一个是什么？");
        const shuffled = [...modEE_items].sort(() => Math.random() - 0.5);
        const itemA = shuffled[0], itemB = shuffled[1]; modEE_target = itemB;
        const patternDiv = document.getElementById('modEE-pattern'); patternDiv.innerHTML = '';
        [itemA, itemB, itemA, itemB].forEach(item => { const img = document.createElement('img'); img.src = item.img; img.className = 'modEE-item'; patternDiv.appendChild(img); });
        const qmark = document.createElement('div'); qmark.className = 'modEE-qmark'; qmark.innerText = '?'; patternDiv.appendChild(qmark);
        const choicesDiv = document.getElementById('modEE-choices'); choicesDiv.innerHTML = '';
        const options = [modEE_target, shuffled[2]].sort(() => Math.random() - 0.5);
        options.forEach(opt => { const img = document.createElement('img'); img.src = opt.img; img.className = 'modEE-choice'; img.onclick = () => modEE_check(opt, img); choicesDiv.appendChild(img); });
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modEE_check(item, imgEl) {
        if(item.name === modEE_target.name) { imgEl.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { imgEl.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => imgEl.classList.remove('wrong'), 500); }
    }
</script>
