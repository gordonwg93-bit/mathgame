<style>
    .modMM-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 350px; }
    .modMM-card { width: 140px; height: 140px; background: white; border-radius: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
    .modMM-card:active { transform: scale(0.92); }
    .modMM-card.correct { background: #4ecdc4; animation: modMM-pop 0.6s; }
    .modMM-card.wrong { background: #ff6b6b; animation: modMM-shake 0.5s; }
    .modMM-img { width: 90px; height: 90px; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.15)); }
    @keyframes modMM-pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes modMM-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
</style>
<div class="module-content"><div class="modMM-grid" id="modMM-grid"></div></div>
<script>
    const modMM_items = [{ type: 'fruit', img: 'apple.png' }, { type: 'fruit', img: 'apple.png' }, { type: 'fruit', img: 'apple.png' }, { type: 'shape', img: 'star.png' }];
    let modMM_oddIdx;
    function initModule() {
        window.setInstruction("Which one does not belong?", "哪一个不属于这里？");
        const shuffled = [...modMM_items].sort(() => Math.random() - 0.5);
        modMM_oddIdx = shuffled.findIndex(i => i.type === 'shape');
        const grid = document.getElementById('modMM-grid'); grid.innerHTML = '';
        shuffled.forEach((item, idx) => { const card = document.createElement('div'); card.className = 'modMM-card'; const img = document.createElement('img'); img.src = item.img; img.className = 'modMM-img'; card.appendChild(img); card.onclick = () => modMM_check(idx, card); grid.appendChild(card); });
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modMM_check(idx, card) {
        if(idx === modMM_oddIdx) { card.classList.add('correct'); window.showCelebration("Yes!", "答对了！", "Next", "下一题", initModule); }
        else { card.classList.add('wrong'); window.speak("Try again!", "再试一次！", getLangCode()); setTimeout(() => card.classList.remove('wrong'), 500); }
    }
</script>
