<style>
    .modMM-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
    .modMM-inst { font-size: 2.2rem; font-weight: 800; color: #4a4a4a; margin-bottom: 30px; text-align: center; }
    
    .modMM-stage { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; min-height: 120px; }
    .modMM-fruit {
        width: 80px; height: 80px; cursor: pointer; transition: transform 0.2s, opacity 0.3s;
        filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15));
    }
    .modMM-fruit:active { transform: scale(0.9); }
    .modMM-fruit.selected { transform: scale(1.2) translateY(-15px); filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.25)); }
    .modMM-fruit.sorted { opacity: 0; transform: scale(0); pointer-events: none; }
    
    .modMM-baskets { display: flex; gap: 60px; }
    .modMM-basket {
        width: 140px; height: 140px; background: white; border-radius: 30px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, border 0.2s;
        border: 4px solid transparent;
    }
    .modMM-basket:active { transform: scale(0.95); }
    .modMM-basket.active { border-color: #4ecdc4; transform: scale(1.05); }
    .modMM-basket-icon { font-size: 3rem; }
    .modMM-basket-label { font-size: 1.2rem; font-weight: 800; color: #4a4a4a; margin-top: 5px; }
</style>

<div class="game-content">
    <div class="modMM-wrap">
        <div class="modMM-inst" id="modMM-inst">Sort the fruits!</div>
        <div class="modMM-stage" id="modMM-stage"></div>
        <div class="modMM-baskets">
            <div class="modMM-basket" id="modMM-basket-apple" onclick="modMM_sortInto('apple')">
                <div class="modMM-basket-icon">🍎</div>
                <div class="modMM-basket-label" id="modMM-label-apple">Apple</div>
            </div>
            <div class="modMM-basket" id="modMM-basket-orange" onclick="modMM_sortInto('orange')">
                <div class="modMM-basket-icon">🍊</div>
                <div class="modMM-basket-label" id="modMM-label-orange">Orange</div>
            </div>
        </div>
    </div>
</div>

<script>
    let modMM_selectedFruit = null;
    let modMM_selectedEl = null;
    let modMM_remaining = 0;

    const modMM_text = {
        en: { inst: "Tap a fruit, then tap the basket!", done: "All sorted!", apple: "Apple Basket", orange: "Orange Basket" },
        zh: { inst: "点击水果，然后点击篮子！", done: "分好啦！", apple: "苹果篮", orange: "橘子篮" }
    };

    function initCurrentModule() { modMM_setup(); }
    function destroyCurrentModule() { window.speechSynthesis.cancel(); }

    function modMM_setup() {
        modMM_selectedFruit = null;
        modMM_selectedEl = null;
        
        const lang = window.appState.currentLang;
        document.getElementById('modMM-inst').innerText = modMM_text[lang].inst;
        document.getElementById('modMM-label-apple').innerText = modMM_text[lang].apple;
        document.getElementById('modMM-label-orange').innerText = modMM_text[lang].orange;

        const stage = document.getElementById('modMM-stage');
        stage.innerHTML = '';

        // Generate 4 apples and 4 oranges, shuffled
        let fruits = [];
        for(let i=0; i<4; i++) fruits.push('apple');
        for(let i=0; i<4; i++) fruits.push('orange');
        fruits.sort(() => Math.random() - 0.5);

        modMM_remaining = fruits.length;

        fruits.forEach(type => {
            const img = document.createElement('img');
            img.src = type === 'apple' ? 'apple.png' : 'orange.png';
            img.className = 'modMM-fruit';
            img.dataset.type = type;
            img.onclick = () => modMM_selectFruit(img, type);
            stage.appendChild(img);
        });

        document.getElementById('modMM-basket-apple').classList.remove('active');
        document.getElementById('modMM-basket-orange').classList.remove('active');
    }

    function modMM_selectFruit(el, type) {
        // Deselect previous
        if(modMM_selectedEl) modMM_selectedEl.classList.remove('selected');
        
        modMM_selectedFruit = type;
        modMM_selectedEl = el;
        el.classList.add('selected');
    }

    function modMM_sortInto(basketType) {
        if(!modMM_selectedFruit) return;

        const lang = window.appState.currentLang;
        const code = lang === 'en' ? 'en-US' : 'zh-CN';

        if(modMM_selectedFruit === basketType) {
            // Correct!
            modMM_selectedEl.classList.remove('selected');
            modMM_selectedEl.classList.add('sorted');
            modMM_selectedFruit = null;
            modMM_selectedEl = null;
            modMM_remaining--;

            const basket = document.getElementById(`modMM-basket-${basketType}`);
            basket.classList.add('active');
            setTimeout(() => basket.classList.remove('active'), 300);

            if(modMM_remaining === 0) {
                setTimeout(() => {
                    document.getElementById('modMM-inst').innerText = modMM_text[lang].done;
                    speak(modMM_text[lang].done, code);
                    setTimeout(modMM_setup, 2000);
                }, 500);
            }
        } else {
            // Wrong basket
            speak(lang === 'en' ? "Try again!" : "再试一次！", code);
            modMM_selectedEl.classList.remove('selected');
            modMM_selectedFruit = null;
            modMM_selectedEl = null;
        }
    }
</script>
