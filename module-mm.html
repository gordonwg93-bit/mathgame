<style>
    .modMM-stage { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; min-height: 120px; }
    .modMM-fruit { width: 80px; height: 80px; cursor: pointer; transition: transform 0.2s, opacity 0.3s; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.15)); }
    .modMM-fruit:active { transform: scale(0.9); }
    .modMM-fruit.selected { transform: scale(1.2) translateY(-15px); filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.25)); }
    .modMM-fruit.sorted { opacity: 0; transform: scale(0); pointer-events: none; }
    .modMM-baskets { display: flex; gap: 60px; }
    .modMM-basket { width: 140px; height: 140px; background: white; border-radius: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, border 0.2s; border: 4px solid transparent; }
    .modMM-basket:active { transform: scale(0.95); }
    .modMM-basket.active { border-color: #4ecdc4; transform: scale(1.05); }
    .modMM-basket-icon { font-size: 3rem; }
    .modMM-basket-label { font-size: 1.2rem; font-weight: 800; color: #4a4a4a; margin-top: 5px; }
</style>

<div class="module-content">
    <div class="modMM-stage" id="modMM-stage"></div>
    <div class="modMM-baskets">
        <div class="modMM-basket" id="modMM-basket-apple" onclick="modMM_sort('apple')">
            <div class="modMM-basket-icon">🍎</div>
            <div class="modMM-basket-label" id="modMM-label-apple">Apple</div>
        </div>
        <div class="modMM-basket" id="modMM-basket-orange" onclick="modMM_sort('orange')">
            <div class="modMM-basket-icon">🍊</div>
            <div class="modMM-basket-label" id="modMM-label-orange">Orange</div>
        </div>
    </div>
</div>

<script>
    let modMM_selFruit = null, modMM_selEl = null, modMM_remaining = 0;

    function initModule() {
        modMM_selFruit = null; modMM_selEl = null;
        document.getElementById('modMM-label-apple').innerText = window.appState.currentLang === 'en' ? 'Apple Basket' : '苹果篮';
        document.getElementById('modMM-label-orange').innerText = window.appState.currentLang === 'en' ? 'Orange Basket' : '橘子篮';
        window.setInstruction("Tap a fruit, then tap the basket!", "点击水果，然后点击篮子！");

        const stage = document.getElementById('modMM-stage');
        stage.innerHTML = '';
        let fruits = [];
        for(let i=0; i<4; i++) fruits.push('apple');
        for(let i=0; i<4; i++) fruits.push('orange');
        fruits.sort(() => Math.random() - 0.5);
        modMM_remaining = fruits.length;

        fruits.forEach(type => {
            const img = document.createElement('img');
            img.src = type === 'apple' ? 'apple.png' : 'orange.png';
            img.className = 'modMM-fruit'; img.dataset.type = type;
            img.onclick = () => modMM_select(img, type);
            stage.appendChild(img);
        });
    }

    function destroyModule() { window.speechSynthesis.cancel(); }

    function modMM_select(el, type) {
        if(modMM_selEl) modMM_selEl.classList.remove('selected');
        modMM_selFruit = type; modMM_selEl = el;
        el.classList.add('selected');
    }

    function modMM_sort(basketType) {
        if(!modMM_selFruit) return;
        if(modMM_selFruit === basketType) {
            modMM_selEl.classList.remove('selected');
            modMM_selEl.classList.add('sorted');
            modMM_selFruit = null; modMM_selEl = null;
            modMM_remaining--;
            const basket = document.getElementById(`modMM-basket-${basketType}`);
            basket.classList.add('active');
            setTimeout(() => basket.classList.remove('active'), 300);
            if(modMM_remaining === 0) {
                setTimeout(() => {
                    window.showCelebration("All sorted!", "分好啦！", "Play Again!", "再玩一次！", initModule);
                }, 500);
            }
        } else {
            window.speak(window.appState.currentLang === 'en' ? "Try again!" : "再试一次！", getLangCode());
            modMM_selEl.classList.remove('selected');
            modMM_selFruit = null; modMM_selEl = null;
        }
    }
</script>
