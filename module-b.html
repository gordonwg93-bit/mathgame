<style>
    .modB-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 400px; }
    .modB-item { width: 70px; height: 70px; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.15)); }
    .modB-item:active { transform: scale(0.9); }
    .modB-item.tapped { animation: modB-pop 0.5s forwards; }
    @keyframes modB-pop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
</style>
<div class="module-content"><div class="modB-grid" id="modB-grid"></div></div>
<script>
    let modB_count = 0, modB_target = 0;
    const modB_imgs = ['apple.png', 'star.png', 'fish.png', 'car.png'];
    function initModule() {
        modB_count = 0; modB_target = Math.floor(Math.random() * 5) + 1;
        const imgSrc = modB_imgs[Math.floor(Math.random() * modB_imgs.length)];
        window.setInstruction(`Tap ${modB_target}!`, `点击 ${modB_target} 个！`);
        const grid = document.getElementById('modB-grid'); grid.innerHTML = '';
        for(let i=0; i<8; i++) { 
            const img = document.createElement('img'); img.src = imgSrc; img.className = 'modB-item'; 
            img.onclick = () => modB_tap(img); grid.appendChild(img); 
        }
    }
    function destroyModule() { window.speechSynthesis.cancel(); }
    function onLanguageChange() { initModule(); }
    function modB_tap(el) {
        if (el.classList.contains('tapped')) return; el.classList.add('tapped'); modB_count++;
        const numsEn = ["", "One", "Two", "Three", "Four", "Five"], numsZh = ["", "一", "二", "三", "四", "五"];
        window.speak(window.appState.currentLang === 'en' ? numsEn[modB_count] : numsZh[modB_count], getLangCode());
        if (modB_count === modB_target) setTimeout(() => window.showCelebration("Great Job!", "太棒了！", "Next", "下一题", initModule), 600);
        else if (modB_count > modB_target) setTimeout(() => { window.speak("Too many!", "太多了！", getLangCode()); setTimeout(initModule, 1500); }, 400);
    }
</script>
